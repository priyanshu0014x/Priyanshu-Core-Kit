name: Build APK with Fixed NDK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev libffi-dev uuid-dev execstack checkinstall

    - name: Install Buildozer Dependencies
      run: |
        pip install --upgrade pip
        pip install cython==0.29.33 git+https://github.com/kivy/buildozer.git@master python-for-android

    - name: Manually Download and Setup NDK 25b
      run: |
        echo "Downloading fixed NDK 25b..."
        wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
        echo "Unzipping NDK..."
        unzip -q android-ndk-r25b-linux.zip -d $HOME
        echo "ANDROID_NDK_HOME=$HOME/android-ndk-r25b" >> $GITHUB_ENV
        echo "NDK path setup complete!"

    - name: Build APK with Buildozer
      run: |
        export ANDROID_NDK_HOME=$HOME/android-ndk-r25b
        buildozer android debug
      env:
        TERM: xterm

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Priyanshu-Core-App
        path: bin/*.apk
